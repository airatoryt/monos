<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF0000" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#511720" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spiral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="50%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#511720"/>
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="100" cy="100" r="95" fill="url(#glow)" opacity="0.3"/>

  <!-- Diamond frame -->
  <path d="M 100 20 L 175 100 L 100 180 L 25 100 Z" stroke="#FF0000" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Inner diamond -->
  <path d="M 100 40 L 155 100 L 100 160 L 45 100 Z" stroke="#FF0000" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Spiral -->
  <path d="M 100 100
           m 0 -5
           a 5 5 0 1 1 0 10
           a 10 10 0 1 1 0 -20
           a 15 15 0 1 1 0 30
           a 20 20 0 1 1 0 -40
           a 25 25 0 1 1 0 50
           a 30 30 0 1 1 0 -60"
        stroke="url(#spiral)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Cardinal points -->
  <line x1="100" y1="10" x2="100" y2="25" stroke="#FF0000" stroke-width="2"/>
  <line x1="100" y1="175" x2="100" y2="190" stroke="#FF0000" stroke-width="2"/>
  <line x1="10" y1="100" x2="25" y2="100" stroke="#FF0000" stroke-width="2"/>
  <line x1="175" y1="100" x2="190" y2="100" stroke="#FF0000" stroke-width="2"/>

  <!-- Corner accents -->
  <circle cx="100" cy="20" r="3" fill="#FF0000"/>
  <circle cx="100" cy="180" r="3" fill="#FF0000"/>
  <circle cx="20" cy="100" r="3" fill="#FF0000"/>
  <circle cx="180" cy="100" r="3" fill="#FF0000"/>
</svg>
