<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <radialGradient id="burstGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FF6B6B" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF0000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#511720" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Explosion glow -->
  <circle cx="150" cy="150" r="140" fill="url(#burstGlow)"/>

  <!-- Shockwave rings -->
  <circle cx="150" cy="150" r="30" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.9"/>
  <circle cx="150" cy="150" r="60" stroke="#FF6B6B" stroke-width="1.5" fill="none" opacity="0.7"/>
  <circle cx="150" cy="150" r="90" stroke="#FF0000" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="150" cy="150" r="120" stroke="#511720" stroke-width="0.5" fill="none" opacity="0.3"/>

  <!-- Radiating lines -->
  <g stroke="#FF0000" stroke-width="2" stroke-linecap="round">
    <line x1="150" y1="20" x2="150" y2="50"/>
    <line x1="150" y1="250" x2="150" y2="280"/>
    <line x1="20" y1="150" x2="50" y2="150"/>
    <line x1="250" y1="150" x2="280" y2="150"/>
    <line x1="60" y1="60" x2="80" y2="80"/>
    <line x1="220" y1="220" x2="240" y2="240"/>
    <line x1="240" y1="60" x2="220" y2="80"/>
    <line x1="60" y1="240" x2="80" y2="220"/>
  </g>

  <!-- Spiral fragments -->
  <g stroke="#FF6B6B" stroke-width="1.5" fill="none">
    <path d="M 150 150 m 0 -15 a 15 15 0 1 1 0 30 a 25 25 0 1 1 0 -50" opacity="0.6"/>
    <path d="M 150 150 m 0 -8 a 8 8 0 1 1 0 16" opacity="0.8"/>
  </g>
</svg>
